<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中医体质测算（统计版）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      line-height: 1.8;
      font-size: 18px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.06);
    }
    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.4;
    }
    h1 { font-size: 34px; }
    h2 { font-size: 28px; }
    h3 { font-size: 24px; }
    .desc, .footer-note {
      color: #666;
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 900px) {
      .grid, .grid-3 {
        grid-template-columns: 1fr;
      }
      body { font-size: 19px; }
      h1 { font-size: 30px; }
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 19px;
    }
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d8deea;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .section-title {
      padding-bottom: 10px;
      border-bottom: 2px solid #eef2f7;
      margin-bottom: 18px;
    }
    .question {
      border: 1px solid #e9edf5;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fcfdff;
    }
    .question-title {
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 20px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      border: 1px solid #dbe3f0;
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 500;
      font-size: 18px;
    }
    .option input {
      margin-right: 8px;
      transform: scale(1.2);
    }
    .btn {
      border: none;
      background: #1677ff;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }
    .btn.secondary {
      background: #eff4ff;
      color: #1668dc;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hidden {
      display: none;
    }
    .pill {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      background: #eef5ff;
      color: #1668dc;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #edf1f6;
      font-size: 16px;
      vertical-align: top;
    }
    th {
      background: #fafbfd;
    }
    .warn {
      color: #c23a3a;
      font-size: 16px;
      margin-top: 8px;
    }
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .score-highlight {
      font-size: 22px;
      font-weight: 700;
      color: #1668dc;
    }
    .subtle-box {
      background: #f7f9fc;
      border: 1px solid #e7edf7;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 900px) {
      .checkbox-group {
        grid-template-columns: 1fr;
      }
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #dbe3f0;
      border-radius: 12px;
      background: #fff;
      font-size: 18px;
      font-weight: 500;
    }
    .checkbox-item input { transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="pageIntro">
      <div class="top-actions">
        <div>
          <h1>中医体质测算（统计版）</h1>
          <div class="desc">适合老年人阅读的大字体版本。提交后自动计算体质结果，并导出适合校验和统计分析的 Excel 文件。</div>
        </div>
        <div class="btn-row">
          <button class="btn secondary" type="button" id="saveLocalBtn">保存本次结果到本机</button>
          <button class="btn secondary" type="button" id="loadLocalBtn">读取上次结果</button>
        </div>
      </div>
    </div>

    <form id="assessmentForm">
      <div class="card">
        <h2 class="section-title">基础信息</h2>
        <div class="grid-3">
          <div>
            <label for="recordId">编号</label>
            <input id="recordId" name="recordId" type="text" placeholder="例如：A001" />
          </div>
          <div>
            <label for="name">姓名</label>
            <input id="name" name="name" type="text" placeholder="请输入姓名" />
          </div>
          <div>
            <label for="gender">性别（必选）</label>
            <select id="gender" name="gender" required>
              <option value="">请选择</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </div>
        </div>
        <div class="grid-3" style="margin-top: 16px;">
          <div>
            <label for="age">年龄（必填）</label>
            <input id="age" name="age" type="number" min="0" max="120" placeholder="请输入年龄" />
          </div>
          <div>
            <label for="ageGroup">年龄分层</label>
            <input id="ageGroup" name="ageGroup" type="text" placeholder="自动生成" readonly />
          </div>
          <div>
            <label for="residence">居住地</label>
            <input id="residence" name="residence" type="text" placeholder="例如：北京市朝阳区" />
          </div>
        </div>
        <div class="grid" style="margin-top: 16px;">
          <div>
            <label for="organization">社区/机构</label>
            <input id="organization" name="organization" type="text" placeholder="例如：XX社区卫生服务中心" />
          </div>
          <div>
            <label for="operatorName">测评人员</label>
            <input id="operatorName" name="operatorName" type="text" placeholder="例如：张医生 / 王护士" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">既往病史与慢病信息</h2>
        <div class="grid">
          <div>
            <label for="hasChronicDisease">是否有慢病（非必填）</label>
            <select id="hasChronicDisease" name="hasChronicDisease">
              <option value="">请选择</option>
              <option value="无">无</option>
              <option value="有">有</option>
            </select>
          </div>
          <div>
            <label for="history">既往病史补充说明（非必填）</label>
            <textarea id="history" name="history" placeholder="可填写既往疾病、过敏史、长期用药等"></textarea>
          </div>
        </div>
        <div style="margin-top: 16px;">
          <label>慢病类型（可多选，非必选）</label>
          <div class="checkbox-group" id="chronicDiseaseGroup"></div>
        </div>
      </div>

      <div id="questionnaire"></div>

      <div class="card">
        <div class="btn-row">
          <button class="btn" type="submit">提交并计算</button>
          <button class="btn secondary" type="button" id="resetBtn">清空重填</button>
          <button class="btn secondary hidden" type="button" id="exportExcelTopBtn">导出 Excel</button>
        </div>
        <div class="footer-note" style="margin-top: 10px;">
          说明：本工具仅用于体质测评参考，不替代临床诊断。
        </div>
        <div id="formError" class="warn hidden"></div>
      </div>
    </form>

    <div id="resultSection" class="hidden"></div>
  </div>

  <script>
    const OPTION_LABELS = {
      1: "没有（根本不）",
      2: "很少（有一点）",
      3: "有时（有些）",
      4: "经常（相当）",
      5: "总是（非常）"
    };

    const CHRONIC_DISEASE_OPTIONS = [
      "高血压", "糖尿病", "冠心病", "脑卒中", "骨关节病", "慢性胃病", "慢性呼吸系统疾病", "失眠", "便秘", "其他"
    ];

    const QUESTIONNAIRE = [
      { constitution: "平和质", items: [
        { id: "PH1", text: "您精力充沛吗？", reverse: false, gender: "all" },
        { id: "PH2", text: "您容易疲乏吗？", reverse: true, gender: "all" },
        { id: "PH3", text: "您感到闷闷不乐、情绪低沉吗？", reverse: true, gender: "all" },
        { id: "PH4", text: "您比一般人耐受不了寒冷（冬天的寒冷、夏天的冷空调、电扇等）吗？", reverse: true, gender: "all" }
      ]},
      { constitution: "气虚质", items: [
        { id: "QX1", text: "您容易疲乏吗？", reverse: false, gender: "all" },
        { id: "QX2", text: "您容易气短（呼吸短促，接不上气）吗？", reverse: false, gender: "all" },
        { id: "QX3", text: "您容易心慌吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "阳虚质", items: [
        { id: "YX1", text: "您胃脘部、背部或腰膝部怕冷吗？", reverse: false, gender: "all" },
        { id: "YX2", text: "您感到怕冷、衣服比别人穿得多吗？", reverse: false, gender: "all" },
        { id: "YX3", text: "您比一般人耐受不了寒冷（冬天的寒冷、夏天的冷空调、电扇等）吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "阴虚质", items: [
        { id: "YY1", text: "您感觉身体、脸上发热吗？", reverse: false, gender: "all" },
        { id: "YY2", text: "您皮肤或口唇干吗？", reverse: false, gender: "all" },
        { id: "YY3", text: "您面部两颧潮红或偏红吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "痰湿质", items: [
        { id: "TS1", text: "您感到身体沉重不轻松或不爽快吗？", reverse: false, gender: "all" },
        { id: "TS2", text: "您腹部肥满松软吗？", reverse: false, gender: "all" },
        { id: "TS3", text: "您嘴里有黏黏的感觉吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "湿热质", items: [
        { id: "SR1", text: "您面部或鼻部有油腻感或者油亮发光吗？", reverse: false, gender: "all" },
        { id: "SR2", text: "您小便时尿道有发热感、尿色浓（深）吗？", reverse: false, gender: "all" },
        { id: "SR3", text: "您带下色黄（白带颜色发黄）吗？（限女性回答）", reverse: false, gender: "female" },
        { id: "SR4", text: "您的阴囊部位潮湿吗？（限男性回答）", reverse: false, gender: "male" }
      ]},
      { constitution: "血瘀质", items: [
        { id: "XY1", text: "您身体上有哪里疼痛吗？", reverse: false, gender: "all" },
        { id: "XY2", text: "您面色晦暗或容易出现褐斑吗？", reverse: false, gender: "all" },
        { id: "XY3", text: "您口唇颜色偏暗吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "气郁质", items: [
        { id: "QY1", text: "您感到闷闷不乐、情绪低沉吗？", reverse: false, gender: "all" },
        { id: "QY2", text: "您容易精神紧张、焦虑不安吗？", reverse: false, gender: "all" },
        { id: "QY3", text: "您多愁善感、感情脆弱吗？", reverse: false, gender: "all" }
      ]},
      { constitution: "特禀质", items: [
        { id: "TB1", text: "您没有感冒时也会打喷嚏吗？", reverse: false, gender: "all" },
        { id: "TB2", text: "您容易过敏（对药物、食物、气味、花粉或在季节交替、气候变化时）吗？", reverse: false, gender: "all" },
        { id: "TB3", text: "您的皮肤容易起荨麻疹（风团、风疹块、风疙瘩）吗？", reverse: false, gender: "all" },
        { id: "TB4", text: "您的皮肤一抓就红，并出现抓痕吗？", reverse: false, gender: "all" }
      ]}
    ];

    let latestData = null;

    function initChronicDiseaseOptions() {
      const container = document.getElementById("chronicDiseaseGroup");
      container.innerHTML = CHRONIC_DISEASE_OPTIONS.map(option => `
        <label class="checkbox-item">
          <input type="checkbox" name="chronicDisease" value="${option}">
          <span>${option}</span>
        </label>
      `).join("");
    }

    function reverseScore(value) { return 6 - value; }

    function conversionScore(rawScore, itemCount) {
      return Number((((rawScore - itemCount) / (itemCount * 4)) * 100).toFixed(2));
    }

    function getAgeGroup(age) {
      const n = Number(age);
      if (!Number.isFinite(n)) return "";
      if (n < 60) return "60岁以下";
      if (n <= 69) return "60-69岁";
      if (n <= 79) return "70-79岁";
      return "80岁及以上";
    }

    function updateAgeGroup() {
      const age = document.getElementById("age").value.trim();
      document.getElementById("ageGroup").value = age ? getAgeGroup(age) : "";
    }

    function getApplicableItems(gender) {
      const result = [];
      QUESTIONNAIRE.forEach(group => {
        group.items.forEach(item => {
          if (item.gender === "all" || item.gender === gender) {
            result.push({ constitution: group.constitution, item });
          }
        });
      });
      return result;
    }

    function renderQuestions() {
      const container = document.getElementById("questionnaire");
      container.innerHTML = "";
      QUESTIONNAIRE.forEach(group => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h2 class="section-title">${group.constitution}</h2>`;
        group.items.forEach((item, index) => {
          const q = document.createElement("div");
          q.className = "question";
          q.dataset.gender = item.gender;
          q.innerHTML = `
            <div class="question-title">${index + 1}. ${item.text}</div>
            <div class="options">
              ${Object.entries(OPTION_LABELS).map(([score, label]) => `
                <label class="option">
                  <input type="radio" name="${item.id}" value="${score}">
                  ${score} ${label}
                </label>
              `).join("")}
            </div>
          `;
          card.appendChild(q);
        });
        container.appendChild(card);
      });
      refreshGenderQuestions();
    }

    function refreshGenderQuestions() {
      const gender = document.getElementById("gender").value;
      const questions = document.querySelectorAll(".question");
      questions.forEach(q => {
        const limit = q.dataset.gender;
        const visible = limit === "all" || limit === gender || gender === "";
        q.style.display = visible ? "block" : "none";
        if (!visible) {
          q.querySelectorAll("input[type='radio']").forEach(r => r.checked = false);
        }
      });
    }

    function collectAnswers() {
      const gender = document.getElementById("gender").value;
      const applicableItems = getApplicableItems(gender);
      const answers = {};
      for (const { item } of applicableItems) {
        const selected = document.querySelector(`input[name="${item.id}"]:checked`);
        if (!selected) {
          throw new Error(`请完成题目：${item.text}`);
        }
        answers[item.id] = Number(selected.value);
      }
      return answers;
    }

    function collectChronicDiseases() {
      return Array.from(document.querySelectorAll('input[name="chronicDisease"]:checked')).map(item => item.value);
    }

    function evaluateConstitution(answers, gender) {
      const result = {};
      QUESTIONNAIRE.forEach(group => {
        const applicableItems = group.items.filter(item => item.gender === "all" || item.gender === gender);
        const values = applicableItems.map(item => {
          const raw = Number(answers[item.id]);
          return item.reverse ? reverseScore(raw) : raw;
        });
        const rawScore = values.reduce((sum, v) => sum + v, 0);
        const itemCount = applicableItems.length;
        const transformedScore = conversionScore(rawScore, itemCount);
        result[group.constitution] = {
          raw_score: rawScore,
          item_count: itemCount,
          transformed_score: transformedScore
        };
      });

      const otherNames = ["气虚质", "阳虚质", "阴虚质", "痰湿质", "湿热质", "血瘀质", "气郁质", "特禀质"];
      const pingheScore = result["平和质"].transformed_score;
      const otherScores = otherNames.map(name => result[name].transformed_score);

      let pingheJudgment = "否";
      if (pingheScore >= 60 && otherScores.every(s => s < 30)) {
        pingheJudgment = "是";
      } else if (pingheScore >= 60 && otherScores.every(s => s < 40)) {
        pingheJudgment = "基本是";
      }
      result["平和质"].judgment = pingheJudgment;

      otherNames.forEach(name => {
        const score = result[name].transformed_score;
        let judgment = "否";
        if (score >= 40) judgment = "是";
        else if (score >= 30 && score <= 39) judgment = "倾向是";
        result[name].judgment = judgment;
      });

      const positive = Object.entries(result)
        .filter(([, data]) => ["是", "基本是", "倾向是"].includes(data.judgment))
        .map(([constitution, data]) => ({ constitution, ...data }))
        .sort((a, b) => b.transformed_score - a.transformed_score);

      let primaryConstitution = "";
      if (["是", "基本是"].includes(result["平和质"].judgment)) {
        primaryConstitution = "平和质";
      } else if (positive.length > 0) {
        primaryConstitution = positive[0].constitution;
      } else {
        primaryConstitution = Object.entries(result).sort((a, b) => b[1].transformed_score - a[1].transformed_score)[0][0];
      }

      return {
        primary_constitution: primaryConstitution,
        positive_constitutions: positive,
        all_scores: result
      };
    }

    function getQuestionInfoMap() {
      const map = {};
      QUESTIONNAIRE.forEach(group => {
        group.items.forEach(item => {
          map[item.id] = {
            constitution: group.constitution,
            text: item.text,
            gender: item.gender,
            reverse: item.reverse
          };
        });
      });
      return map;
    }

    function renderResult(profile, summary, answers) {
      const resultSection = document.getElementById("resultSection");
      resultSection.className = "";
      resultSection.innerHTML = `
        <div class="card">
          <h2>测算结果</h2>
          <div class="desc">
            ${profile.recordId ? `编号：${escapeHtml(profile.recordId)} ｜ ` : ""}
            ${profile.name ? `姓名：${escapeHtml(profile.name)} ｜ ` : ""}
            性别：${profile.gender === "male" ? "男" : "女"}
            ${profile.age ? ` ｜ 年龄：${escapeHtml(String(profile.age))}` : ""}
            ${profile.ageGroup ? ` ｜ 年龄分层：${escapeHtml(profile.ageGroup)}` : ""}
            ${profile.residence ? ` ｜ 居住地：${escapeHtml(profile.residence)}` : ""}
          </div>
          <div class="subtle-box">
            <div><strong>社区/机构：</strong>${escapeHtml(profile.organization || "") || "未填写"}</div>
            <div><strong>测评人员：</strong>${escapeHtml(profile.operatorName || "") || "未填写"}</div>
            <div><strong>是否有慢病：</strong>${escapeHtml(profile.hasChronicDisease || "") || "未填写"}</div>
            <div><strong>慢病类型：</strong>${profile.chronicDiseases.length ? profile.chronicDiseases.map(escapeHtml).join("、") : "未填写"}</div>
            <div><strong>既往病史补充：</strong>${profile.history ? escapeHtml(profile.history).replaceAll("\n", "<br>") : "未填写"}</div>
          </div>
        </div>

        <div class="card">
          <h3>综合结论</h3>
          <p>主判定体质：<span class="score-highlight">${summary.primary_constitution}</span></p>
          ${summary.positive_constitutions.length > 0
            ? `<div>${summary.positive_constitutions.map(item => `<span class="pill">${item.constitution}：${item.judgment}（${item.transformed_score}分）</span>`).join("")}</div>`
            : `<p>暂无明显倾向体质，建议结合完整临床评估进一步判断。</p>`}
          <p class="footer-note">说明：本工具仅用于体质测评参考，不替代临床诊断。</p>
        </div>

        <div class="card">
          <h3>各体质详细结果</h3>
          <table>
            <thead>
              <tr>
                <th>体质类型</th>
                <th>原始分</th>
                <th>条目数</th>
                <th>转化分</th>
                <th>判定</th>
              </tr>
            </thead>
            <tbody>
              ${Object.entries(summary.all_scores).map(([name, data]) => `
                <tr>
                  <td>${name}</td>
                  <td>${data.raw_score}</td>
                  <td>${data.item_count}</td>
                  <td>${data.transformed_score}</td>
                  <td>${data.judgment}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>

        <div class="card">
          <div class="btn-row">
            <button class="btn" type="button" id="saveResultBtn">保存本次结果到本机</button>
            <button class="btn secondary" type="button" id="exportExcelBtn">导出 Excel</button>
          </div>
        </div>
      `;

      document.getElementById("saveResultBtn").onclick = () => {
        saveToLocal(profile, answers, summary);
        alert("已保存到当前浏览器本地。");
      };
      document.getElementById("exportExcelBtn").onclick = exportExcel;
      document.getElementById("exportExcelTopBtn").classList.remove("hidden");
      resultSection.scrollIntoView({ behavior: "smooth" });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function saveToLocal(profile, answers, summary) {
      const data = {
        saved_at: new Date().toISOString(),
        profile,
        answers,
        summary
      };
      localStorage.setItem("tcm_constitution_latest", JSON.stringify(data));
      latestData = data;
    }

    function loadFromLocal() {
      const raw = localStorage.getItem("tcm_constitution_latest");
      if (!raw) {
        alert("当前浏览器没有保存过结果。");
        return;
      }
      const data = JSON.parse(raw);
      const { profile, answers, summary } = data;
      latestData = data;

      document.getElementById("recordId").value = profile.recordId || "";
      document.getElementById("name").value = profile.name || "";
      document.getElementById("gender").value = profile.gender || "";
      document.getElementById("age").value = profile.age || "";
      document.getElementById("ageGroup").value = profile.ageGroup || "";
      document.getElementById("residence").value = profile.residence || "";
      document.getElementById("organization").value = profile.organization || "";
      document.getElementById("operatorName").value = profile.operatorName || "";
      document.getElementById("hasChronicDisease").value = profile.hasChronicDisease || "";
      document.getElementById("history").value = profile.history || "";

      document.querySelectorAll('input[name="chronicDisease"]').forEach(item => {
        item.checked = profile.chronicDiseases?.includes(item.value) || false;
      });

      refreshGenderQuestions();
      Object.entries(answers).forEach(([id, value]) => {
        const radio = document.querySelector(`input[name="${id}"][value="${value}"]`);
        if (radio) radio.checked = true;
      });
      renderResult(profile, summary, answers);
      alert("已读取上次保存结果。");
    }

    function resetForm() {
      document.getElementById("assessmentForm").reset();
      document.getElementById("ageGroup").value = "";
      document.querySelectorAll('input[name="chronicDisease"]').forEach(item => item.checked = false);
      document.getElementById("resultSection").className = "hidden";
      document.getElementById("resultSection").innerHTML = "";
      document.getElementById("formError").className = "warn hidden";
      document.getElementById("formError").textContent = "";
      document.getElementById("exportExcelTopBtn").classList.add("hidden");
      latestData = null;
      refreshGenderQuestions();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function csvEscape(value) {
      const text = value == null ? "" : String(value);
      return `"${text.replaceAll('"', '""')}"`;
    }

    function buildCsvRows() {
      if (!latestData) return [];
      const rows = [];
      const qmap = getQuestionInfoMap();
      const data = latestData;

      rows.push(["sheet", "结果汇总"]);
      rows.push([
        "记录时间", "编号", "姓名", "性别", "年龄", "年龄分层", "居住地", "社区/机构", "测评人员", "是否有慢病", "慢病类型", "既往病史补充", "主判定体质",
        "平和质判定", "气虚质判定", "阳虚质判定", "阴虚质判定", "痰湿质判定", "湿热质判定", "血瘀质判定", "气郁质判定", "特禀质判定",
        "平和质转化分", "气虚质转化分", "阳虚质转化分", "阴虚质转化分", "痰湿质转化分", "湿热质转化分", "血瘀质转化分", "气郁质转化分", "特禀质转化分"
      ]);
      rows.push([
        data.saved_at,
        data.profile.recordId || "",
        data.profile.name || "",
        data.profile.gender === "male" ? "男" : "女",
        data.profile.age || "",
        data.profile.ageGroup || "",
        data.profile.residence || "",
        data.profile.organization || "",
        data.profile.operatorName || "",
        data.profile.hasChronicDisease || "",
        (data.profile.chronicDiseases || []).join("、"),
        data.profile.history || "",
        data.summary.primary_constitution || "",
        data.summary.all_scores["平和质"].judgment,
        data.summary.all_scores["气虚质"].judgment,
        data.summary.all_scores["阳虚质"].judgment,
        data.summary.all_scores["阴虚质"].judgment,
        data.summary.all_scores["痰湿质"].judgment,
        data.summary.all_scores["湿热质"].judgment,
        data.summary.all_scores["血瘀质"].judgment,
        data.summary.all_scores["气郁质"].judgment,
        data.summary.all_scores["特禀质"].judgment,
        data.summary.all_scores["平和质"].transformed_score,
        data.summary.all_scores["气虚质"].transformed_score,
        data.summary.all_scores["阳虚质"].transformed_score,
        data.summary.all_scores["阴虚质"].transformed_score,
        data.summary.all_scores["痰湿质"].transformed_score,
        data.summary.all_scores["湿热质"].transformed_score,
        data.summary.all_scores["血瘀质"].transformed_score,
        data.summary.all_scores["气郁质"].transformed_score,
        data.summary.all_scores["特禀质"].transformed_score
      ]);

      rows.push([]);
      rows.push(["sheet", "作答明细"]);
      rows.push(["记录时间", "编号", "姓名", "题目ID", "体质类型", "题目内容", "用户选项值", "用户选项文本"]);
      Object.entries(data.answers).forEach(([id, value]) => {
        rows.push([
          data.saved_at,
          data.profile.recordId || "",
          data.profile.name || "",
          id,
          qmap[id]?.constitution || "",
          qmap[id]?.text || "",
          value,
          OPTION_LABELS[value] || ""
        ]);
      });
      return rows;
    }

    function exportExcel() {
      if (!latestData) {
        alert("请先完成一次测算，再导出 Excel。");
        return;
      }
      const rows = buildCsvRows();
      const csvContent = "\uFEFF" + rows.map(row => row.map(csvEscape).join(",")).join("\r\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const fileName = `中医体质测算统计版_${formatDateForFileName(new Date())}.csv`;
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function formatDateForFileName(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${y}${m}${d}_${hh}${mm}${ss}`;
    }

    function buildProfile() {
      const age = document.getElementById("age").value.trim();
      const chronicDiseases = collectChronicDiseases();
      return {
        recordId: document.getElementById("recordId").value.trim(),
        name: document.getElementById("name").value.trim(),
        gender: document.getElementById("gender").value,
        age,
        ageGroup: age ? getAgeGroup(age) : "",
        residence: document.getElementById("residence").value.trim(),
        organization: document.getElementById("organization").value.trim(),
        operatorName: document.getElementById("operatorName").value.trim(),
        hasChronicDisease: document.getElementById("hasChronicDisease").value,
        chronicDiseases,
        history: document.getElementById("history").value.trim()
      };
    }

    document.getElementById("gender").addEventListener("change", refreshGenderQuestions);
    document.getElementById("age").addEventListener("input", updateAgeGroup);

    document.getElementById("assessmentForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const errorBox = document.getElementById("formError");
      errorBox.className = "warn hidden";
      errorBox.textContent = "";
      try {
        const profile = buildProfile();
        if (!profile.gender) throw new Error("请先选择性别。");
        if (!profile.age) throw new Error("请填写年龄。");
        const answers = collectAnswers();
        const summary = evaluateConstitution(answers, profile.gender);
        latestData = {
          saved_at: new Date().toISOString(),
          profile,
          answers,
          summary
        };
        renderResult(profile, summary, answers);
      } catch (err) {
        errorBox.textContent = err.message || "提交失败，请检查表单。";
        errorBox.className = "warn";
      }
    });

    document.getElementById("saveLocalBtn").addEventListener("click", function() {
      try {
        const profile = buildProfile();
        if (!profile.gender) {
          alert("请至少先选择性别并完成一次测算。");
          return;
        }
        const answers = collectAnswers();
        const summary = evaluateConstitution(answers, profile.gender);
        saveToLocal(profile, answers, summary);
        alert("已保存到当前浏览器本地。");
      } catch (err) {
        alert(err.message || "保存失败，请先完成当前问卷。");
      }
    });

    document.getElementById("loadLocalBtn").addEventListener("click", loadFromLocal);
    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("exportExcelTopBtn").addEventListener("click", exportExcel);

    initChronicDiseaseOptions();
    renderQuestions();
  </script>
</body>
</html>
